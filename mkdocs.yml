site_name: Tashtiot APIs Library
site_description: >-
  Infrastructure connectors (ArgoCD, AWX, Bitbucket Server, Vault) and a reusable
  FastAPI application template, in one Python package.

# Catch broken in-page anchors (#fragment) under --strict — not validated by default.
validation:
  links:
    anchors: warn

theme:
  name: material
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            members_order: source
            show_root_heading: true
            show_root_full_path: false
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            filters: ["!^_"]
            show_if_no_docstring: true  # list public symbols in module pages even without a docstring
            scoped_crossrefs: true      # resolve [`Name`][Name] cross-refs up the scope chain

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html                 # enables grid cards (markdown inside HTML)
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:            # renders :material-*: shortcodes as inline SVG icons
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]          # allow including repo-root files (e.g. CHANGELOG.md)
      check_paths: true         # fail the build if an included file is missing
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Tutorials:
      - tutorials/index.md
      - Your first app: tutorials/first-app.md
      - Secure your API: tutorials/secure-your-api.md
  - How-to guides:
      - how-to/index.md
      - Read & write Bitbucket files: how-to/read-write-bitbucket.md
      - Drive AWX, ArgoCD & Vault: how-to/use-awx-argocd-vault.md
      - Verify a token outside a request: how-to/verify-a-token.md
      - Call other services with SSO: how-to/call-services-with-sso.md
      - Enable the Remote Config API: how-to/enable-remote-config-api.md
      - Run a job: how-to/run-a-job.md
      - Generate dev auth material: how-to/generate-auth-material.md
      - Add a new connector: how-to/add-a-connector.md
      - Extend the FastAPI template: how-to/extend-the-template.md
  - Reference:
      - reference/index.md
      - Configuration: reference/configuration.md
      - CLI (gen-auth-material): reference/cli.md
      - API:
          - Connectors: reference/api/connectors.md
          - FastAPI app: reference/api/fastapi-app.md
          - Auth (inbound JWT): reference/api/auth.md
          - Security (outbound SSO): reference/api/security.md
          - Remote Config API: reference/api/config-api.md
      - Job manager: reference/job-manager.md
          - Errors: reference/api/errors.md
          - Schemas: reference/api/schemas.md
  - Explanation:
      - explanation/index.md
      - Architecture: explanation/architecture.md
      - Job manager: explanation/job-manager.md
      - Authentication design: explanation/authentication.md
      - Logging: explanation/logging.md
  - Contributing:
      - contributing/index.md
      - Development: contributing/development.md
  - Changelog: changelog.md
