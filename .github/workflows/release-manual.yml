# Manual release for legacy feature branches that never went through the PR flow.
#
# Run it from the Actions tab against any branch. git-cliff is scoped to *that branch's*
# history only, the version is computed (or overridden), the package is built + attested,
# and a GitHub Release is created from the branch HEAD.
#
# Note: releasing off a non-default branch is atypical — the tag/release points at the
# dispatched branch's HEAD, not master.
name: release-manual

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. v1.2.3). Leave blank to let git-cliff compute it."
        required: false
        default: ""

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}   # the dispatched branch
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Compute version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            version="${{ github.event.inputs.version }}"
          else
            # --current scopes git-cliff to the checked-out branch's history only.
            version="$(uvx git-cliff --config cliff.toml --current --bumped-version)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes (this branch only)
        run: uvx git-cliff --config cliff.toml --current --strip all -o RELEASE_NOTES.md

      - name: Tag the branch HEAD
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin "${VERSION}"

      - name: Build the release artifacts
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          export SETUPTOOLS_SCM_PRETEND_VERSION="${SETUPTOOLS_SCM_PRETEND_VERSION#v}"
          uv build

      - name: Generate an SBOM (CycloneDX)
        # Scan a throwaway venv with the just-built wheel installed, so the SBOM
        # captures the package and its resolved dependency tree.
        run: |
          uv venv .sbom-venv
          uv pip install --python .sbom-venv dist/*.whl
          uvx --from cyclonedx-bom cyclonedx-py environment .sbom-venv \
            -o dist/sbom.cdx.json || true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*.tar.gz, dist/*.whl"

      - name: Create the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          body_path: RELEASE_NOTES.md
          # Legacy branch builds are flagged as pre-releases.
          prerelease: true
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/sbom.cdx.json
