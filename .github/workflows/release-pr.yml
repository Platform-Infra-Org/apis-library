# PR-driven release automation.
#
#   * PR opened / updated against master  -> build a "test version" and upload it as a
#     workflow artifact (no commit, no tag, no release).
#   * PR merged into master               -> git-cliff bumps the version + rewrites
#     CHANGELOG.md, the change is committed back to master, a tag is pushed, the package
#     is built, build provenance is attested, an SBOM is generated, and a GitHub Release
#     is created with the sdist/wheel (+ SBOM) attached.
#
# The pushed tag also fires the existing Woodpecker -> Artifactory publish (dual release).
name: release-pr

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [master]

# One run per PR; new pushes cancel the in-flight test build. (closed/merge runs to completion.)
concurrency:
  group: release-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------ open / update
  # Build a throwaway "test version" so reviewers can install the PR's artifact.
  test-build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags so git-cliff/setuptools-scm see them

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Compute the next (bumped) version
        id: ver
        run: |
          # Dev marker keeps the test artifact from colliding with a real release version.
          base="$(uvx git-cliff --config cliff.toml --bumped-version | sed 's/^v//')"
          echo "version=${base}.dev${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Build the test version
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.ver.outputs.version }}
        run: uv build

      - name: Upload the test version artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-test-${{ steps.ver.outputs.version }}
          path: dist/*
          if-no-files-found: error

  # ------------------------------------------------------------------ merge
  release:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write       # commit CHANGELOG, push tag, create the release
      id-token: write       # OIDC for keyless provenance signing
      attestations: write   # actions/attest-build-provenance
    steps:
      # Mint a short-lived token for the release App so the CHANGELOG commit + tag
      # push to master authenticate as the App (which is on the branch-protection
      # bypass list — the default GITHUB_TOKEN can't be).
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Compute release version
        id: ver
        run: |
          echo "version=$(uvx git-cliff --config cliff.toml --bumped-version)" >> "$GITHUB_OUTPUT"
          # Release only if a version-bumping commit landed since the last tag. Docs-only (and the
          # already-non-bumping chore/style/test) merges refresh the changelog's [Unreleased]
          # section but don't cut a release — the docs/ tree isn't shipped in the wheel, so a
          # docs-only release would republish a byte-identical artifact.
          # ponytail: releasing-type list mirrors cliff.toml's bumping parsers; a footer-only
          # "BREAKING CHANGE:" on a docs/chore commit won't trip this — mark such commits feat!/fix!.
          latest="$(git describe --tags --abbrev=0 2>/dev/null || echo '')"
          range="${latest:+${latest}..}HEAD"
          rel='^(feat|fix|perf|refactor|revert|ci|build)(\(.+\))?!?:|^[a-z]+(\(.+\))?!:'
          if git log "$range" --format='%s' | grep -qE "$rel"; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Only non-releasing commits (docs/chore/…) since ${latest:-repo start}; refreshing changelog, no release."
          fi

      - name: Update CHANGELOG
        run: |
          if [ "${{ steps.ver.outputs.release }}" = "true" ]; then
            # --bump moves the "Unreleased" entries under the new vX.Y.Z heading + date.
            uvx git-cliff --config cliff.toml --bump -o CHANGELOG.md
          else
            # No bump: regenerate so docs-only commits land under [Unreleased].
            uvx git-cliff --config cliff.toml -o CHANGELOG.md
          fi

      - name: Commit CHANGELOG and (on release) push the tag
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          RELEASE: ${{ steps.ver.outputs.release }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if [ "$RELEASE" = "true" ]; then
            # No-op safe: only commit if git-cliff actually changed the file.
            git diff --staged --quiet || git commit -m "chore(release): ${VERSION} [skip ci]"
            git tag -a "${VERSION}" -m "Release ${VERSION}"
            git push origin HEAD:master
            git push origin "${VERSION}"
          else
            git diff --staged --quiet || git commit -m "chore(changelog): refresh unreleased [skip ci]"
            git push origin HEAD:master
          fi

      - name: Build the release artifacts
        if: steps.ver.outputs.release == 'true'
        env:
          # Strip the leading "v" — setuptools-scm wants a PEP 440 version.
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          export SETUPTOOLS_SCM_PRETEND_VERSION="${SETUPTOOLS_SCM_PRETEND_VERSION#v}"
          uv build

      - name: Generate an SBOM (CycloneDX)
        if: steps.ver.outputs.release == 'true'
        # Scan a throwaway venv with the just-built wheel installed, so the SBOM
        # captures the package and its resolved dependency tree.
        run: |
          uv venv .sbom-venv
          uv pip install --python .sbom-venv dist/*.whl
          uvx --from cyclonedx-bom cyclonedx-py environment .sbom-venv \
            -o dist/sbom.cdx.json || true

      - name: Attest build provenance
        if: steps.ver.outputs.release == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*.tar.gz, dist/*.whl"

      - name: Extract this release's notes
        if: steps.ver.outputs.release == 'true'
        run: uvx git-cliff --config cliff.toml --latest --strip all -o RELEASE_NOTES.md

      - name: Create the GitHub Release
        if: steps.ver.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/sbom.cdx.json

  # ------------------------------------------------------------------ docs
  # Publish the MkDocs site to GitHub Pages via the gh-pages branch method:
  # `mkdocs gh-deploy` builds the site and force-pushes it to the gh-pages branch
  # (it writes a .nojekyll file, so GitHub's legacy Jekyll builder is skipped).
  # `needs: release` means this checks out master *after* the release job's CHANGELOG
  # commit, so the published site reflects the released version (docs include
  # CHANGELOG.md via a snippet).
  # One-time setup: repo Settings -> Pages -> Build and deployment ->
  # Source = "Deploy from a branch" -> Branch = gh-pages / (root).
  deploy-docs:
    needs: release
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the built site to the gh-pages branch
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0   # full history so the CHANGELOG snippet + git info resolve

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Deploy docs to gh-pages branch
        run: uv run --extra docs mkdocs gh-deploy --force --strict
