when:
  - event: [tag, manual]

steps:
# ========================================== BUILD AND PUBLISH ==============================================================
- name: Build and publish package
  image: harbor.app.com/devops-infra/generic-python39:1.0.0
  environment:
    ARTIFACTORY_USERNAME: dev_admin
    ARTIFACTORY_PASSWORD: 
      from_secret: artifactory_token
    ARTIFACTORY_URL: https://artifactory.app.com
    ARTIFACTORY_REPO: pypi-local
    PACKAGE_NAME: tashtiot_apis_library
  commands: 
  - pip install --upgrade pip
  - pip install build toml
  - PACKAGE_NAME="$PACKAGE_NAME"
  - PACKAGE_VERSION="${CI_COMMIT_TAG}"
  - export PACKAGE_NAME PACKAGE_VERSION
  - |
    python - <<'PY'
    import toml, pathlib, os
    file = pathlib.Path("pyproject.toml")
    data = toml.loads(file.read_text())
    data["project"]["name"] = os.environ["PACKAGE_NAME"]
    data["project"]["version"] = os.environ["PACKAGE_VERSION"]
    file.write_text(toml.dumps(data))
    print("Updated pyproject.toml with name/version:", data["project"]["name"], data["project"]["version"])
    PY
  - python -m build
  - ls -lh dist
  - |
        for file in dist/*; do
          echo "Uploading $file to $ARTIFACTORY_URL/artifactory/$ARTIFACTORY_REPO/$PACKAGE_NAME/$PACKAGE_VERSION/"
          curl -k -u "$ARTIFACTORY_USERNAME:$ARTIFACTORY_PASSWORD" \
            -T "$file" \
            "$ARTIFACTORY_URL/artifactory/$ARTIFACTORY_REPO/$PACKAGE_NAME/$PACKAGE_VERSION/$file"
        done
